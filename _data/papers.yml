# Publications data source.
#
# Fields:
#   id         stable slug used to pair this paper with its fetched abstract
#              (see _data/paper_abstracts.yml, produced by .github/workflows/fetch-abstracts.yml)
#   type       tag type: journal | proceedings | workshop | demo | chapter |
#              talk | poster | article | preprint
#   fetch_url  (optional) URL the workflow should pull an abstract from
#              (arXiv abs page, DOI link, or direct PDF). Omit for talks,
#              posters without a public artifact, or gated venues.
#   entry      rendered citation HTML (authors, year, title, venue, links)
#   summary    short plain-text blurb rendered inside <details> on the
#              publications page. Can be authored by hand or seeded from the
#              fetched abstract and edited.

