  items:
    - id: evaluation-blind-spot
      type: preprint
      entry: |-
        <strong>Ion, M.</strong>, Godfrey, J. (2026). <em>The Evaluation Blind Spot: Per-Prompt Similarity Can Systematically Misrank Instruction-Tuned Text Distributions.</em> In preparation, NeurIPS 2026.
      summary:

    - id: moves-to-pathways
      type: proceedings
      entry: |-
        Light, M., <strong>Ion, M.</strong>, Collins-Thompson, K. (2026). <em>From Moves to Pathways: Characterizing Pedagogical Discourse Dynamics in Online Tutoring with Bayesian Generative Modeling.</em> 27th International Conference on Artificial Intelligence in Education (AIED '26), Late-Breaking Results (Posters) Track. Accepted, 29% acceptance rate.
      summary: |-
        A hierarchical Bayesian Hidden Markov Model fit to 2,437 math tutoring conversations (51k+ messages) from MathMentorDB, using LLM-classified discourse moves. Four latent pedagogical states emerge unsupervised (Problem Introduction, Exploration, Lecturing, Working). Resolved and unresolved sessions differ less in what tutors say than in whether students are actively attempting inference — replicating impasse-driven learning findings at two orders of magnitude greater scale than prior manually-annotated studies.

    - id: measuring-simulation-fidelity
      type: proceedings
      entry: |-
        <strong>Ion, M.</strong>, Collins-Thompson, K. (2026). <em>Measuring Simulation Fidelity via Statistical Detectability: A Diagnostic Framework for AI-Generated Tutoring Conversations.</em> In Proceedings of the 13th ACM Conference on Learning @ Scale (L@S '26). ACM, New York, NY, USA, 11 pages. Accepted, 22% acceptance rate.
      summary: |-
        A propensity-score MSE framework for assessing whether LLM-generated conversations match the distribution of real ones. L1-regularized classifiers on interpretable feature subsets reveal that surface and cognitive fidelity are coupled: improving one without attending to the other can worsen overall fidelity. The framework turns a scalar quality score into a diagnostic for iterative prompt refinement.

    - id: fidelity-workbench
      type: demo
      entry: |-
        <strong>Ion, M.</strong>, Collins-Thompson, K. (2026). <em>A Fidelity Diagnostic Workbench for Synthetic Tutoring Conversations.</em> ACM Conference on Learning @ Scale (L@S 2026), Demonstration Track.
      summary: |-
        Interactive tool operationalizing the pMSE framework from the companion L@S paper. Traces a synthetic conversation from generation prompt through feature extraction to L1 coefficients, with side-by-side real/synthetic contrast and a scorecard exposing the surface–cognitive coupling directly.

    - id: structured-outputs-infinicon
      type: talk
      entry: |-
        <strong>Ion, M.</strong> (2026). <em>Structured Outputs from LLMs: Prompting vs. Fine-Tuning on Free Colab.</em> Infinicon. San Luis Obispo, CA. <a href="https://colab.research.google.com/drive/1WVyyTRVHiZJV2LyHE8AtH3KjQJIPk0wd?usp=sharing">[notebook]</a>
      summary: |-
        Walkthrough comparing two ways to get LLMs to return structured outputs: prompting approaches for specific fields and categories, then fine-tuning an open-weight model on a free Colab instance. Side-by-side comparison of reliability, cost, and engineering overhead.

