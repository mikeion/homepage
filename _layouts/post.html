---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>{% if page.tags and page.tags.size > 0 %} · {% for tag in page.tags %}<a class="wtag" href="{{ '/blog/tags/' | append: tag | append: '/' | relative_url }}">{{ tag }}</a>{% unless forloop.last %} {% endunless %}{% endfor %}{% endif %}
    </div>
  </header>

  <div class="post-body">
    {{ content }}
  </div>

  <nav class="post-nav">
    <a href="{{ '/blog/' | relative_url }}">← all posts</a>
  </nav>
</article>
